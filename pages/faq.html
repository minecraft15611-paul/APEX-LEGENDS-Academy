<!-- ================= ARTICLES ================= -->
<div class="container my-5">
    <div class="accordion" id="faqAccordion">

        <!-- Question 1 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" data-bs-toggle="collapse"
                        data-bs-target="#q1">
                    Q1：新手入坑應該學習什麼部分優先？
                </button>
            </h2>
            <div id="q1" class="accordion-collapse collapse show"
                 data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    跟敵人保持距離，什麼時候該射擊什麼時候該躲掩體。
                </div>
            </div>
        </div>

        <!-- Question 2 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse"
                        data-bs-target="#q2">
                    Q2：跟槍瞄準怎麼進步？
                </button>
            </h2>
            <div id="q2" class="accordion-collapse collapse"
                 data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    建議去靶場熟悉跟槍再去實戰，靈敏度以慢為優先，跟得上再往上調。
                </div>
            </div>
        </div>

        <!-- Question 3 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse"
                        data-bs-target="#q3">
                    Q3：會戰老是打輸，有沒有提升勝率的方法？
                </button>
            </h2>
            <div id="q3" class="accordion-collapse collapse"
                 data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    對槍保持距離，留有空間可以周旋，並依照角色特性決定站位。
                </div>
            </div>
        </div>

        <!-- Question 4 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse"
                        data-bs-target="#q4">
                    Q4：有沒有其他建議可以馬上提升戰鬥力的？
                </button>
            </h2>
            <div id="q4" class="accordion-collapse collapse"
                 data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    自動衝刺打開，視野FOV調到最大近戰腰射跟槍更容易，大電大補設置快捷鍵確保馬上使用，效能顯示打開注意FPS跟PING。
                </div>
            </div>
        </div>

        <!-- Question 5 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse"
                        data-bs-target="#q5">
                    Q5：很多人在用身法，身法是必要的嗎？
                </button>
            </h2>
            <div id="q5" class="accordion-collapse collapse"
                 data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    不是，使用身法某程度上會犧牲部分射擊能力，但可以增加生存能力，畢竟不是每次都有掩體可以躲，總有躲不過的時候。
                </div>
            </div>
        </div>

        <!-- Question 6 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse"
                        data-bs-target="#q6">
                    Q6：老手建議？
                </button>
            </h2>
            <div id="q6" class="accordion-collapse collapse"
                 data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    冷靜思考的人才會贏，輕鬆的心情才能玩得愉快。
                </div>
            </div>
        </div>
    </div>
</div>
