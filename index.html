    <style>
        /* --- Global Apex Style Go To Top Button --- */
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
            /* Increase Z-INDEX to stay above everything */
            z-index: 10000;

            /* Force visibility settings */
            display: flex !important;
            align-items: center;
            justify-content: center;

            /* Transition and Hidden State */
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px);

            clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* This class MUST be applied by JS */
        #backToTop.show {
            opacity: 1 !important;
            visibility: visible !important;
            transform: translateY(0) !important;
        }

        #backToTop:hover {
            background: white;
            color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            transform: translateY(-5px);
        }

        .arrow-up {
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 12px solid currentColor;
        }

        @media (max-width: 768px) {
            #backToTop {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }
        }

        #footerModalBody {
            /* This ensures that \n or actual line breaks in text are rendered */
            white-space: pre-line;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* Remove text decoration from links inside modal content */
        .modal-content [data-content] a,
        .modal-body a {
            text-decoration: none;
            color: #00d4ff; /* Adjust to match your theme */
            transition: opacity 0.3s ease;
        }

        .modal-content [data-content] a:hover,
        .modal-body a:hover {
            opacity: 0.8;
            text-decoration: underline; /* Optional: underline on hover */
        }

        /* Style for the data source links specifically */
        .modal-content a[target="_blank"]::after {
            content: " ↗";
            font-size: 0.8em;
            margin-left: 2px;
        }

        /* Custom backdrop darkness */
        .modal-backdrop.show {
            opacity: 0.8; /* Adjust for desired darkness (0.0 to 1.0) */
            background-color: #000;
        }

        /* Optional: Prevent scrolling while modal is active */
        body.modal-open {
            overflow: hidden;
        }

        /* New class to force-hide the button when a modal is open */
        #backToTop.modal-hide {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }
/*
        .navbar-brand img{
            height: 35px !important;

*/

        @media (max-width: 768px) {
                    /* shut down bootstrap avoid reflow */
            .collapsing {
                height: auto !important;
                transition: opacity 0.1s ease !important;
                opacity: 0;
            }

            .navbar-collapse.show {
                opacity: 1;
                transition: opacity 0.5s ease;
            }

            .navbar-collapse {
                /* Absolute Positioning & Frosted Glass effect */
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(10, 10, 10, 0.95) !important;
                backdrop-filter: blur(8px);
                
                /* Force GPU Hardware Acceleration for smoother animation */
                transform: translateZ(0);
                backface-visibility: hidden;
                
                padding: 20px;
                z-index: 1050;
                
                /* Initially transparent, transitions to 1 when .show class is added */
                opacity: 0; 
            }
        }

        /* Change all nav links to white */
        .navbar-dark .navbar-nav .nav-link {
            color: #ffffff !important;
            opacity: 0.9; /* Optional: adds a slight pro feel */
            transition: color 0.3s ease;
        }

        /* Add a hover effect so users know it's clickable */
        .navbar-dark .navbar-nav .nav-link:hover {
            color: #ff4b4b !important; /* Apex Red hover looks great */
            opacity: 1;
            
        }

        #musicToggle {
            transition: all 0.3s ease;
            border-color: rgba(255, 255, 255, 0.3);
        }

        #musicToggle:hover {
             /* background: #ff4b4b; *//* Apex Red */ 
            border-color: #ff4b4b;
            transform: scale(1.1);
        }

        /* Animation for when music is playing */
        .fa-volume-high {
            animation: pulse-audio 1.5s infinite;
        }

        @keyframes pulse-audio {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #musicToggle {
            position: fixed;
            right: 30px;
            bottom: 30px; /* Default position at bottom right */
            width: 50px;
            height: 50px;
            border-radius: 50% !important; /* Circular to match the theme */
            z-index: 10001; /* Stay slightly above the backToTop button (10000) */
            display: flex !important;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid #ff0000;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* SHIFT LOGIC: When backToTop has the 'show' class, move the music button up */
        #backToTop.show ~ #musicToggle {
            bottom: 90px; /* Base 30px + backToTop height 50px + 10px margin */
        }

        /* Ensure the button stays hidden when modals are open (consistent with your existing code) */
        #musicToggle.modal-hide {
            display: none !important;
        }

        @media (max-width: 768px) {
            #musicToggle {
                right: 20px;
                bottom: 20px;
                width: 45px;
                height: 45px;
            }
            #backToTop.show ~ #musicToggle {
                bottom: 75px; /* Adjust for smaller mobile buttons */
            }
        }

    </style>
